<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plant Disease Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1f0d 0%, #1a3a1a 50%, #0d1f0d 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px; width: 100%;
      color: #fff;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo { font-size: 48px; text-align: center; margin-bottom: 12px; }
    h1 { text-align: center; font-size: 26px; font-weight: 700; color: #7eda7e; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 32px; }

    .drop-zone {
      border: 2px dashed rgba(126,218,126,0.5);
      border-radius: 14px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(126,218,126,0.03);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #7eda7e;
      background: rgba(126,218,126,0.08);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 40px; margin-bottom: 12px; }
    .drop-text { color: #ccc; font-size: 15px; }
    .drop-sub  { color: #888; font-size: 12px; margin-top: 6px; }
    .preview-wrap { margin-top: 14px; display: none; }
    .preview-wrap img { max-height: 180px; border-radius: 10px; max-width: 100%; }
    .filename { color: #7eda7e; font-size: 13px; margin-top: 6px; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2d7a2d, #4caf50);
      color: #fff; font-size: 16px; font-weight: 600;
      border: none; border-radius: 12px;
      cursor: pointer; margin-top: 24px;
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    .btn:hover { background: linear-gradient(135deg, #3a8e3a, #5cbf60); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error {
      background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4);
      color: #f88; border-radius: 10px; padding: 12px 16px;
      font-size: 14px; margin-bottom: 20px; text-align: center;
    }

    .loading { display: none; text-align: center; padding: 14px 0; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(126,218,126,0.2);
      border-top-color: #7eda7e; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
      vertical-align: middle; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .info-row {
      display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap;
    }
    .info-chip {
      flex: 1; min-width: 120px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .info-chip .num { font-size: 22px; font-weight: 700; color: #7eda7e; }
    .info-chip .lbl { font-size: 11px; color: #888; margin-top: 3px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <h1>Plant Disease Detector</h1>
  <p class="subtitle">AI-powered leaf disease identification using MobileNetV2</p>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/predict" enctype="multipart/form-data" id="uploadForm">
    <div class="drop-zone" id="dropZone">
      <input type="file" name="file" id="fileInput" accept=".jpg,.jpeg,.png" required />
      <div class="drop-icon">📷</div>
      <div class="drop-text">Drag & drop a leaf image here</div>
      <div class="drop-sub">or click to browse — JPG, PNG up to 10MB</div>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="Preview" />
      <div class="filename" id="fileName"></div>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span> Analysing leaf...
    </div>

    <button type="submit" class="btn" id="submitBtn">🔍 Detect Disease</button>
  </form>

  <div class="info-row">
    <div class="info-chip"><div class="num">38</div><div class="lbl">Disease classes</div></div>
    <div class="info-chip"><div class="num">54K+</div><div class="lbl">Training images</div></div>
    <div class="info-chip"><div class="num">~95%</div><div class="lbl">Accuracy</div></div>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const fileName    = document.getElementById('fileName');
  const dropZone    = document.getElementById('dropZone');
  const form        = document.getElementById('uploadForm');
  const loading     = document.getElementById('loading');
  const submitBtn   = document.getElementById('submitBtn');

  fileInput.addEventListener('change', showPreview);

  function showPreview() {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewWrap.style.display = 'block';
      fileName.textContent = file.name;
    };
    reader.readAsDataURL(file);
  }

  ['dragover','dragleave','drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => e.preventDefault());
  });
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragover');
    const dt = new DataTransfer();
    dt.items.add(e.dataTransfer.files[0]);
    fileInput.files = dt.files;
    showPreview();
  });

  form.addEventListener('submit', () => {
    loading.style.display = 'block';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Analysing...';
  });
</script>
</body>
</html>
